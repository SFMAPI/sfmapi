name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "app/**"
      - "clients/python/**"
      - ".readthedocs.yaml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".readthedocs.yaml"
  # Allow manual re-publish from the Actions tab.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: |
          uv venv
          uv pip install -e .
          uv pip install -e clients/python
          uv pip install -r docs/requirements.txt
      - name: Sphinx build (warning -> error)
        run: |
          uv run sphinx-build -b html -W --keep-going docs docs/_build/html
      - name: Upload built site (PR previews + retention)
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          retention-days: 14

  deploy:
    # Push the strict-built site to the org-pages repo on every main
    # push. Skipped on PRs (no secrets) and when the deploy token is
    # absent (graceful no-op until the destination repo + PAT are
    # provisioned).
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Bail early if deploy token isn't configured
        id: gate
        env:
          DEPLOY_TOKEN: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "GH_PAGES_DEPLOY_TOKEN not set; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download built site
        if: steps.gate.outputs.skip != 'true'
        uses: actions/download-artifact@v8
        with:
          name: docs-html
          path: site
      - name: Push to sfmapi/sfmapi.github.io
        if: steps.gate.outputs.skip != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
          external_repository: sfmapi/sfmapi.github.io
          publish_branch: main
          publish_dir: ./site
          # Don't keep .git history on the destination — every push
          # is a clean snapshot so the pages repo stays tiny.
          force_orphan: true
          # Sphinx already emits a `_static/` tree; Jekyll would treat
          # the leading underscore as a hidden directory and drop it.
          enable_jekyll: false
          commit_message: "docs: deploy ${{ github.sha }}"
