apiVersion: v1
kind: Service
metadata:
  name: {{ include "sfmapi.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sfmapi.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  selector:
    {{- include "sfmapi.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
