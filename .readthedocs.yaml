# Read the Docs build config — see https://docs.readthedocs.io/page/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_install:
      # Install runtime + sdk so autodoc can introspect them.
      - pip install -e .
      - pip install -e clients/python
      - pip install -r docs/requirements.txt

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - htmlzip

python:
  install: []   # handled in post_install above
